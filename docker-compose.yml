services:
  # Service 1: The Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Service 2: The FastAPI RAG API Server
  rag-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag-api-server
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - GENERATOR_PROVIDER=${GENERATOR_PROVIDER}
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Override Qdrant host to use Docker's Service Name "qdrant"
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant # Simply wait for Qdrant container process to start
    restart: unless-stopped

volumes:
  qdrant_data:
