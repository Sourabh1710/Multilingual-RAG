name: Lint & Type Check

on:
  push:
    branches: [ "**" ] # Triggers on push to any branch
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Code Quality (Ruff, Black, mypy)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup uv inside the GitHub runner
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true # Caches dependencies to make future runs instant

      # 3. Setup Python runtime
      - name: Set up Python
        run: uv python install 3.12

      # 4. Synchronize dependencies cleanly
      - name: Install Dependencies
        run: uv sync --frozen --all-extras

      # # 5. Run Black formatting check
      # - name: Run Black
      #   run: uv run black --check .

      # 6. Run Ruff linting check
      - name: Run Ruff
        run: uv run ruff check .

      # 7. Run mypy static type analysis
      - name: Run mypy
        run: uv run mypy src/
